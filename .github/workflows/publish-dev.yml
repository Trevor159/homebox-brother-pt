name: Publish dev image

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Homebox repo to build from (owner/repo)'
        required: true
        default: 'sysadminsmedia/homebox'
      ref:
        description: 'Branch, tag, or commit SHA to build from'
        required: true
        default: 'main'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout homebox
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          path: homebox-src

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build homebox base image
        uses: docker/build-push-action@v6
        with:
          context: homebox-src
          load: true
          tags: homebox-local:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            HOMEBOX_IMAGE=homebox-local:dev
          tags: ${{ steps.image.outputs.name }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
