name: Publish release image

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest homebox release tag
        id: homebox
        run: |
          tag=$(curl -sf https://api.github.com/repos/sysadminsmedia/homebox/releases/latest | jq -r .tag_name)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Check if we already published this tag
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.homebox.outputs.tag }}"
          exists=$(gh release view "$tag" --repo "${{ github.repository }}" 2>/dev/null && echo true || echo false)
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            HOMEBOX_IMAGE=ghcr.io/sysadminsmedia/homebox:${{ steps.homebox.outputs.docker_tag }}
          tags: |
            ${{ steps.homebox.outputs.image }}:${{ steps.homebox.outputs.tag }}
            ${{ steps.homebox.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.homebox.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.homebox.outputs.tag }}" \
            --notes "Built on top of [homebox ${{ steps.homebox.outputs.tag }}](https://github.com/sysadminsmedia/homebox/releases/tag/${{ steps.homebox.outputs.tag }}) with Brother P-Touch label printing support."
